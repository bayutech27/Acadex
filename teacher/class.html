<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Acadex - Class Report Card</title>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    /* All styles from original class.html – preserved exactly */
    /* ... (full original CSS) ... */
  </style>
</head>
<body>
<div class="dashboard-container">
  <aside class="sidebar"><!-- same as original --></aside>
  <main class="main-content">
    <header class="header"><!-- same as original --></header>
    <div class="content">
      <div class="class-report-container">
        <div class="student-list-sidebar print-hide">
          <div class="term-session-sidebar">
            <div><label>📘 Term:</label> <select id="termSelect"><option value="1">1st Term</option><option value="2">2nd Term</option><option value="3">3rd Term</option></select></div>
            <div><label>📅 Session:</label> <select id="sessionSelect"></select></div>
            <button id="refreshStudentsBtn" class="btn-secondary" style="padding: 4px 12px;">⟳ Refresh</button>
          </div>
          <h3 style="font-size: 1rem;">🎓 Students</h3>
          <div id="studentListContainer"><p>Loading...</p></div>
        </div>
        <div class="report-card-area">
          <div class="report-card" id="reportCardContent"><p style="text-align:center; padding:2rem;">Select a student</p></div>
          <div class="action-buttons print-hide" id="reportActions" style="display: none;">
            <button id="saveReportBtn" class="btn-primary">💾 Save Report</button>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script type="module">
  import { protectTeacherPage, loadSchoolInfo, setupSidebar, setupLogout, setupLogoUpload, checkClassTeacherStatus } from '../js/teacher-dashboard.js';
  import { initClassReportPage } from '../js/class.js';
  protectTeacherPage().then(async () => {
    const isClassTeacher = await checkClassTeacherStatus();
    if (!isClassTeacher) { alert('Not a class teacher.'); window.location.href = 'teacher-dashboard.html'; return; }
    loadSchoolInfo(); setupSidebar(); setupLogout(); setupLogoUpload();
    initClassReportPage();
  });
</script>
</body>
</html>
