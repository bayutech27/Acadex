<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acadex - Enter Scores</title>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    /* Additional scores-specific styles */
    .scores-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }
    .scores-table th, .scores-table td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }
    .scores-table th {
      background-color: #f2f2f2;
    }
    .score-input {
      width: 80px;
      padding: 4px;
    }
    .total-cell {
      font-weight: bold;
    }
    .action-buttons {
      margin: 20px 0;
      display: flex;
      gap: 10px;
    }
    .message {
      padding: 10px;
      margin: 10px 0;
      border-radius: 4px;
      display: none;
    }
    .message.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .message.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .loading {
      text-align: center;
      padding: 20px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="dashboard-container">
    <aside class="sidebar">
      <div class="sidebar-header">Acadex</div>
      <nav class="sidebar-nav">
        <a href="teacher-dashboard.html">Dashboard</a>
        <a href="class.html">Class</a>
        <a href="scores.html" class="active">Scores</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="header">
        <div class="school-header">
          <div class="school-logo">
            <img id="schoolLogoImg" class="logo-circle" alt="School Logo">
            <div id="cameraIcon" class="camera-icon">📷</div>
            <input type="file" id="logoUploadInput" accept="image/*" style="display:none">
          </div>
          <div class="school-name">
            <h1 id="schoolName">Loading...</h1>
          </div>
          <div id="academicInfo" class="academic-info"></div>
        </div>
        <button id="logoutBtn" class="logout-btn">Logout</button>
      </header>

      <div class="content">
        <h2>Enter Student Scores</h2>
        
        <!-- Selection Controls -->
        <div class="filter-section" style="display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px;">
          <div>
            <label for="classSelect">Class:</label>
            <select id="classSelect" style="padding: 5px; min-width: 150px;">
              <option value="">-- Select Class --</option>
            </select>
          </div>
          <div>
            <label for="subjectSelect">Subject:</label>
            <select id="subjectSelect" style="padding: 5px; min-width: 150px;">
              <option value="">-- Select Subject --</option>
            </select>
          </div>
          <div>
            <label for="termSelect">Term:</label>
            <select id="termSelect" style="padding: 5px;">
              <option value="1">1st Term</option>
              <option value="2">2nd Term</option>
              <option value="3">3rd Term</option>
            </select>
          </div>
          <div>
            <label for="sessionSelect">Session:</label>
            <select id="sessionSelect" style="padding: 5px;">
              <option value="">-- Select Session --</option>
            </select>
          </div>
          <div>
            <button id="loadStudentsBtn" class="btn-primary">Load Students</button>
          </div>
        </div>

        <!-- Message area -->
        <div id="message" class="message"></div>

        <!-- Scoring info -->
        <div id="scoringInfo" style="margin-bottom: 15px; font-size: 0.9em; color: #555;"></div>

        <!-- Students Table -->
        <div id="studentsTableContainer">
          <p>Please select class, subject, term, session and click "Load Students".</p>
        </div>

        <!-- Action Buttons -->
        <div class="action-buttons" style="display: none;" id="actionButtons">
          <button id="saveScoresBtn" class="btn-success">Save All Scores</button>
        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { 
      protectTeacherPage, loadSchoolInfo, setupSidebar, setupLogout, setupLogoUpload,
      initScoresPage
    } from '../js/teacher-dashboard.js';

    // Protect page and initialize
    protectTeacherPage().then(() => {
      loadSchoolInfo();
      setupSidebar();
      setupLogout();
      setupLogoUpload();
      initScoresPage();
    });
  </script>
</body>
</html>
