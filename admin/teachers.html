<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acadex - Teachers</title>
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: white;
      border-radius: 12px;
      padding: 24px;
      max-width: 500px;
      width: 90%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .modal-header h2 {
      margin: 0;
    }
    .close-modal {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #718096;
    }
    .form-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 20px;
    }
    select[multiple] {
      height: 120px;
      width: 100%;
      padding: 8px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
    }
    .form-group small {
      display: block;
      color: #718096;
      font-size: 0.75rem;
      margin-top: 4px;
    }
    .school-address {
      font-size: 0.8rem;
      color: #64748b;
      margin-top: 4px;
    }
    /* Header subscription badge styles */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    .school-header {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .subscription-badge {
      margin-left: auto;
      margin-right: 20px;
      font-weight: bold;
      font-size: 0.9rem;
      padding: 4px 12px;
      border-radius: 20px;
      background: #f1f5f9;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .subscription-badge.active {
      background: #dcfce7;
      color: #15803d;
    }
    .subscription-badge.expired {
      background: #fee2e2;
      color: #b91c1c;
    }
  </style>
</head>
<body>
  <div class="dashboard-container">
    <aside class="sidebar">
      <div class="sidebar-header">Acadex</div>
      <nav class="sidebar-nav">
        <a href="admin-dashboard.html">Dashboard</a>
        <a href="teachers.html" class="active">Teachers</a>
        <a href="students.html">Students</a>
        <a href="setup.html">Subjects & Classes</a>
        <a href="results.html">Results</a>
        <a href="records.html">Records</a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="header">
        <div class="school-header">
          <div class="school-logo">
            <img id="schoolLogoImg" class="logo-circle" alt="School Logo">
            <div id="cameraIcon" class="camera-icon">📷</div>
            <input type="file" id="logoUploadInput" accept="image/*" style="display:none">
          </div>
          <div class="school-name">
            <h1 id="schoolName">Loading...</h1>
            <div id="schoolAddress" class="school-address"></div>
          </div>
          <div id="academicInfo" class="academic-info"></div>
        </div>
        <div id="subscriptionBadge" class="subscription-badge">⏳ Loading...</div>
        <button id="logoutBtn" class="logout-btn">Logout</button>
      </header>

      <div class="content">
        <div class="welcome-card">
          <h1>Teachers</h1>
          <p>Manage teacher accounts.</p>
          <button id="addTeacherBtn" class="btn-primary">Add Teacher</button>
        </div>
        <div id="teachersList">
          <p>Loading teachers...</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal for Add/Edit Teacher -->
  <div id="teacherModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Add Teacher</h2>
        <button class="close-modal">&times;</button>
      </div>
      <form id="teacherForm">
        <div class="form-group">
          <label for="teacherName">Full Name</label>
          <input type="text" id="teacherName" required>
        </div>
        <div class="form-group">
          <label for="teacherEmail">Email</label>
          <input type="email" id="teacherEmail" required>
        </div>
        <div class="form-group">
          <label for="teacherSubjects">Assign Subjects (hold Ctrl to select multiple)</label>
          <select id="teacherSubjects" multiple></select>
          <small>Subjects this teacher teaches</small>
        </div>
        <div class="form-group">
          <label for="teacherClasses">Assign Classes (hold Ctrl to select multiple)</label>
          <select id="teacherClasses" multiple></select>
          <small>Classes this teacher teaches</small>
        </div>
        <div class="form-group">
          <label for="teacherClassTeacher">Class Teacher (optional)</label>
          <select id="teacherClassTeacher">
            <option value="">None</option>
          </select>
          <small>Homeroom class teacher</small>
        </div>
        <div class="form-actions">
          <button type="button" id="cancelModalBtn" class="btn-secondary">Cancel</button>
          <button type="submit" id="saveTeacherBtn" class="btn-primary">Save Teacher</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module">
    import { protectAdminPage, loadSchoolInfo, setupSidebar, setupLogout, setupLogoUpload } from '../js/admin.js';
    import { initTeachersPage } from '../js/teachers.js';

    protectAdminPage().then(() => {
      loadSchoolInfo();
      setupSidebar();
      setupLogout();
      setupLogoUpload();
      initTeachersPage();
    });
  </script>
</body>
</html>
